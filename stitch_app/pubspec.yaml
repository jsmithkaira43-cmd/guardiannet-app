name: stitch_app
description: "GuardianNet - Smart Employee Monitoring System Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^12.1.1
  google_fonts: ^6.1.0   # Replaces manual Inter font files — loads from Google CDN

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # No local font assets needed — google_fonts handles Inter at runtime
